services:
  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: production
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    build:
      context: .
      dockerfile: deploy/Dockerfile.nginx
      args:
        VITE_ENABLE_ADS: ${VITE_ENABLE_ADS:-false}
        VITE_ADSENSE_CLIENT_ID: ${VITE_ADSENSE_CLIENT_ID:-ca-pub-XXXXXXXXXXXXXXXX}
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      DOMAIN: ${DOMAIN:-localhost}
    depends_on:
      api:
        condition: service_healthy
