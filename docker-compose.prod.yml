services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-wc26}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-wc26}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wc26}"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-wc26}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wc26}
    expose:
      - "5000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    build:
      context: .
      dockerfile: deploy/Dockerfile.nginx
      args:
        VITE_ENABLE_ADS: ${VITE_ENABLE_ADS:-false}
        VITE_ADSENSE_CLIENT_ID: ${VITE_ADSENSE_CLIENT_ID:-ca-pub-XXXXXXXXXXXXXXXX}
        VITE_GA4_MEASUREMENT_ID: ${VITE_GA4_MEASUREMENT_ID:-}
        VITE_POSTHOG_PROJECT_TOKEN: ${VITE_POSTHOG_PROJECT_TOKEN:-}
        VITE_POSTHOG_HOST: ${VITE_POSTHOG_HOST:-https://eu.i.posthog.com}
        VITE_VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8083:80"
    depends_on:
      api:
        condition: service_healthy

  notifier:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-wc26}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wc26}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c 'while true; do
        flask --app wsgi send-match-notifications;
        sleep 300;
      done'

  live-scores:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-wc26}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wc26}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c 'while true; do
        flask --app wsgi sync-live-scores;
        sleep 30;
      done'

  lineup-sync:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      FLASK_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-wc26}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-wc26}
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
    command: >
      sh -c 'while true; do
        flask --app wsgi sync-lineups;
        sleep 300;
      done'

volumes:
  pgdata:
