# Host nginx vhost for worldcupstats.org (shared VPS — TLS terminates here)
# Install: deploy/scripts/install-host-nginx.sh (requires sudo on the VPS)
#
# Docker app nginx listens on 127.0.0.1:8083 (see docker-compose.prod.yml)

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name worldcupstats.org www.worldcupstats.org;

    ssl_certificate /etc/letsencrypt/live/worldcupstats.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/worldcupstats.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name worldcupstats.org www.worldcupstats.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
