name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: wc26
          POSTGRES_PASSWORD: wc26
          POSTGRES_DB: wc26
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt pytest

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://wc26:wc26@localhost:5432/wc26
          FLASK_ENV: development
          FLASK_APP: wsgi
          WC26_SKIP_DB_BOOTSTRAP: "1"
        working-directory: backend
        run: |
          flask db upgrade
          python -m pytest tests/ -v

  build-frontend:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_ENABLE_ADS: ${{ secrets.VITE_ENABLE_ADS || 'false' }}
          VITE_ADSENSE_CLIENT_ID: ${{ secrets.ADSENSE_CLIENT_ID || 'ca-pub-XXXXXXXXXXXXXXXX' }}
          VITE_GA4_MEASUREMENT_ID: ${{ secrets.VITE_GA4_MEASUREMENT_ID || '' }}
          VITE_POSTHOG_PROJECT_TOKEN: ${{ secrets.VITE_POSTHOG_PROJECT_TOKEN || '' }}
          VITE_POSTHOG_HOST: ${{ secrets.VITE_POSTHOG_HOST || 'https://eu.i.posthog.com' }}
        run: |
          npm install
          npm run build

  deploy:
    runs-on: ubuntu-latest
    needs: [test, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Hetzner
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HETZNER_HOST }}
          username: ${{ secrets.HETZNER_USER }}
          key: ${{ secrets.HETZNER_SSH_KEY }}
          script: |
            export APP_DIR=/opt/world-cup-2026
            cd $APP_DIR
            git fetch origin main
            git reset --hard origin/main
            cat > .env << ENVEOF
            FLASK_ENV=production
            FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}
            POSTGRES_USER=${{ secrets.POSTGRES_USER || 'wc26' }}
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
            POSTGRES_DB=${{ secrets.POSTGRES_DB || 'wc26' }}
            SYNC_SCRAPERS=true
            APP_DOMAIN=https://www.${{ secrets.DOMAIN }}
            RESEND_API_KEY=${{ secrets.RESEND_API_KEY }}
            AUTH_FROM_EMAIL=${{ secrets.AUTH_FROM_EMAIL }}
            GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
            GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}
            GITHUB_CLIENT_ID=${{ secrets.GITHUB_CLIENT_ID }}
            GITHUB_CLIENT_SECRET=${{ secrets.GITHUB_CLIENT_SECRET }}
            VITE_ENABLE_ADS=${{ secrets.VITE_ENABLE_ADS || 'false' }}
            VITE_ADSENSE_CLIENT_ID=${{ secrets.ADSENSE_CLIENT_ID }}
            VITE_GA4_MEASUREMENT_ID=${{ secrets.VITE_GA4_MEASUREMENT_ID }}
            VITE_POSTHOG_PROJECT_TOKEN=${{ secrets.VITE_POSTHOG_PROJECT_TOKEN }}
            VITE_POSTHOG_HOST=${{ secrets.VITE_POSTHOG_HOST || 'https://eu.i.posthog.com' }}
            DOMAIN=${{ secrets.DOMAIN }}
            VAPID_PUBLIC_KEY=${{ secrets.VAPID_PUBLIC_KEY }}
            VAPID_PRIVATE_KEY=${{ secrets.VAPID_PRIVATE_KEY }}
            VAPID_CONTACT_EMAIL=${{ secrets.VAPID_CONTACT_EMAIL }}
            API_FOOTBALL_KEY=${{ secrets.API_FOOTBALL_KEY }}
            API_FOOTBALL_SEASON=2026
            API_FOOTBALL_PROOF_MODE=true
            API_FOOTBALL_PROOF_SEASON=2022
            API_FOOTBALL_PROOF_MATCH_KEY=2022-12-18-argentina-vs-france
            API_FOOTBALL_DAILY_BUDGET=95
            API_FOOTBALL_BACKFILL_ENABLED=true
            API_FOOTBALL_BACKFILL_SEASON=2024
            API_FOOTBALL_COMPETITION_BUDGET=90
            API_FOOTBALL_BACKFILL_PRIORITY=pilot
            ENVEOF
            chmod +x deploy/scripts/deploy.sh
            ./deploy/scripts/deploy.sh
